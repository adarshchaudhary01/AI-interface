<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — an AI interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400..500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="AI.css">
</head>
<body>

<div class="page">

  <!-- ===== Header ===== -->
  <header class="masthead">
    <div class="masthead__mark">
      <span class="masthead__glyph">§</span>
      <span class="masthead__title">Ledger</span>
    </div>
    <div class="masthead__meta">
      <span class="model-tag" id="modelTag">model — quiet.alpha</span>
      <button class="icon-btn" id="clearBtn" title="Clear conversation" aria-label="Clear conversation">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M5 4V2.8C5 2.36 5.36 2 5.8 2H10.2C10.64 2 11 2.36 11 2.8V4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M3.5 4L4.1 13.2C4.13 13.65 4.5 14 4.95 14H11.05C11.5 14 11.87 13.65 11.9 13.2L12.5 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== Conversation ===== -->
  <main class="manuscript" id="manuscript">
    <div class="empty-state" id="emptyState">
      <p class="empty-state__line">A blank page thinks better than a busy one.</p>
      <p class="empty-state__sub">Write the first line below.</p>
    </div>
  </main>

  <!-- ===== Composer ===== -->
  <footer class="composer">
    <form class="composer__form" id="composerForm">
      <textarea
        class="composer__input"
        id="messageInput"
        placeholder="Begin a thought…"
        rows="1"
        aria-label="Message"
      ></textarea>
      <button type="submit" class="composer__send" id="sendBtn" aria-label="Send message">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8H14M14 8L9 3M14 8L9 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </form>
    <div class="composer__hint">Enter to send · Shift + Enter for a new line</div>
  </footer>

</div>

<script src="AI.js"></script>
</body>
</html>
